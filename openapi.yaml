openapi: "3.0.3"

info:
  title: "UidePet - Huellitas Solidarias API"
  version: "1.0.0"
  description: "API REST para gestión de mascotas en adopción del proyecto Huellitas Solidarias UIDE."
  license:
    name: "Académico"

servers:
  - url: "http://localhost:3000"
    description: "Servidor local de desarrollo"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "fundacion@huellitas.com"
        password:
          type: string
          example: "123456"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        usuario:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: "Fundación Huellitas Solidarias"
            email:
              type: string
              example: "fundacion@huellitas.com"
            rol:
              type: string
              example: "organizacion"

    Mascota:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fk_organizacion_id:
          type: integer
          example: 1
        organizacion_nombre:
          type: string
          example: "Fundación Huellitas Solidarias"
        nombre:
          type: string
          example: "Estrella"
        especie:
          type: string
          enum:
            - PERRO
            - GATO
            - CONEJO
            - OTRO
          example: "PERRO"
        raza:
          type: string
          example: "MESTIZO"
        sexo:
          type: string
          enum:
            - MACHO
            - HEMBRA
            - DESCONOCIDO
          example: "HEMBRA"
        edad_aproximada:
          type: string
          example: "1 año"
        tamano:
          type: string
          enum:
            - PEQUENO
            - MEDIANO
            - GRANDE
            - NO_APLICA
          example: "MEDIANO"
        color:
          type: string
          example: "Blanco con negro"
        descripcion:
          type: string
          example: "Perrita tranquila, cariñosa y lista para adopción responsable."
        historia:
          type: string
          example: "Fue rescatada por la organización y recibió atención básica."
        estado_salud:
          type: string
          example: "Vacunada, desparasitada y estable"
        esterilizado:
          type: boolean
          example: false
        estado_adopcion:
          type: string
          enum:
            - NO_DISPONIBLE
            - DISPONIBLE
            - EN_PROCESO
            - ADOPTADO
            - FALLECIDO
          example: "DISPONIBLE"
        fecha_registro:
          type: string
          format: date-time

    CrearMascota:
      type: object
      required:
        - fk_organizacion_id
        - nombre
        - especie
        - sexo
        - edad_aproximada
        - tamano
        - descripcion
        - historia
        - estado_salud
      properties:
        fk_organizacion_id:
          type: integer
          example: 1
        nombre:
          type: string
          minLength: 2
          maxLength: 80
          example: "Estrella"
        especie:
          type: string
          enum:
            - PERRO
            - GATO
            - CONEJO
            - OTRO
          example: "PERRO"
        raza:
          type: string
          example: "MESTIZO"
        sexo:
          type: string
          enum:
            - MACHO
            - HEMBRA
            - DESCONOCIDO
          example: "HEMBRA"
        edad_aproximada:
          type: string
          example: "1 año"
        tamano:
          type: string
          enum:
            - PEQUENO
            - MEDIANO
            - GRANDE
            - NO_APLICA
          example: "MEDIANO"
        color:
          type: string
          example: "Blanco con negro"
        descripcion:
          type: string
          minLength: 10
          example: "Perrita tranquila, cariñosa y lista para adopción responsable."
        historia:
          type: string
          minLength: 10
          example: "Fue rescatada por la organización y recibió atención básica."
        estado_salud:
          type: string
          example: "Vacunada, desparasitada y estable"
        esterilizado:
          type: boolean
          example: false
        estado_adopcion:
          type: string
          enum:
            - NO_DISPONIBLE
            - DISPONIBLE
            - EN_PROCESO
            - ADOPTADO
            - FALLECIDO
          example: "DISPONIBLE"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Token ausente"

    ValidationErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 422
        error:
          type: string
          example: "Datos de entrada inválidos."
        details:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                example: "nombre"
              message:
                type: string
                example: "El nombre debe tener mínimo 2 caracteres"

paths:
  /health:
    get:
      operationId: healthCheck
      summary: "Verificar estado de la API"
      description: "Ruta pública para comprobar que el servidor está activo."
      security: []
      responses:
        "200":
          description: "API activa"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: "API UidePet Huellitas Solidarias activa"
                  timestamp:
                    type: string
                    format: date-time
        "500":
          description: "Error interno del servidor"

  /auth/login:
    post:
      operationId: loginUsuario
      summary: "Iniciar sesión y obtener token JWT"
      description: "Ruta pública que valida credenciales y devuelve un token JWT."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "Login correcto"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: "Email o contraseña faltantes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Credenciales inválidas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/mascotas:
    get:
      operationId: listarMascotas
      summary: "Listar mascotas registradas"
      description: "Lista las mascotas registradas en la base de datos real."
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Lista de mascotas"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Mascota"
        "401":
          description: "Token ausente, inválido o expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: crearMascota
      summary: "Crear una mascota"
      description: "Permite registrar una nueva mascota. Solo roles organizacion o admin."
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrearMascota"
      responses:
        "201":
          description: "Mascota creada correctamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Mascota creada correctamente."
                  data:
                    $ref: "#/components/schemas/Mascota"
        "401":
          description: "Token ausente, inválido o expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Rol insuficiente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: "Datos de entrada inválidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /v1/mascotas/{id}:
    get:
      operationId: obtenerMascota
      summary: "Obtener mascota por ID"
      description: "Obtiene una mascota específica por su identificador."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID de la mascota"
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: "Mascota encontrada"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/Mascota"
        "401":
          description: "Token ausente, inválido o expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Mascota no encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: actualizarMascota
      summary: "Actualizar mascota"
      description: "Actualiza parcialmente una mascota. Solo roles organizacion o admin."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID de la mascota"
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrearMascota"
      responses:
        "200":
          description: "Mascota actualizada"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Mascota actualizada correctamente."
                  data:
                    $ref: "#/components/schemas/Mascota"
        "401":
          description: "Token ausente, inválido o expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Rol insuficiente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Mascota no encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: "Datos inválidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

    delete:
      operationId: eliminarMascota
      summary: "Eliminar mascota"
      description: "Elimina una mascota por ID. Solo roles organizacion o admin."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID de la mascota"
          schema:
            type: integer
            example: 1
      responses:
        "204":
          description: "Mascota eliminada correctamente"
        "401":
          description: "Token ausente, inválido o expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Rol insuficiente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Mascota no encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"